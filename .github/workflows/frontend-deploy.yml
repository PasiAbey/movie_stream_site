name: Deploy Frontend to AWS S3

on:
  push:
    branches:
      - main
    # Wake up ONLY if code inside the frontend folder changes!
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build React App
        # Walk into the frontend folder, install dependencies, and build the Vite project
        env:
          VITE_API_URL: https://d77pd4y9rlvdx.cloudfront.net
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          cd frontend
          npm install
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # CHANGE THIS if your bucket is in a different region (e.g., ap-south-1)

      - name: Sync files to S3
        run: |
          aws s3 sync ./frontend/dist s3://movie-streamer-frontend-pasiabey --delete

      - name: Invalidate CloudFront Cache
        # This tells CloudFront to "refresh" instantly so you can see your changes!
        run: |
          aws cloudfront create-invalidation --distribution-id E3IX76TN306O63 --paths "/*"